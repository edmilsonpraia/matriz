function reducer(state, action) {
  const K = action.type;
  if (K==='ADD_COLAB') { const id = Math.max(0,...state.colaboradores.map(c=>c.id))+1; return {...state, colaboradores:[...state.colaboradores, {potencial:2, ...action.payload, id}]}; }
  if (K==='UPD_COLAB') return {...state, colaboradores: state.colaboradores.map(c=>c.id===action.payload.id?{...c,...action.payload}:c)};
  if (K==='DEL_COLAB') return {...state, colaboradores: state.colaboradores.filter(c=>c.id!==action.payload), avaliacoes: state.avaliacoes.filter(a=>a.colaboradorId!==action.payload)};
  if (K==='ADD_COMP')  { const id = 'c'+Date.now().toString(36); return {...state, competencias:[...state.competencias, {...action.payload, id}]}; }
  if (K==='UPD_COMP')  return {...state, competencias: state.competencias.map(c=>c.id===action.payload.id?{...c,...action.payload}:c)};
  if (K==='DEL_COMP')  return {...state, competencias: state.competencias.filter(c=>c.id!==action.payload), avaliacoes: state.avaliacoes.filter(a=>a.competenciaId!==action.payload), requisitos: state.requisitos.filter(r=>r.competenciaId!==action.payload)};
  if (K==='ADD_AVAL')  { const id = 'a'+Date.now().toString(36)+Math.random().toString(36).slice(2,5); return {...state, avaliacoes:[...state.avaliacoes, {dataAvaliacao:new Date().toISOString().slice(0,10), ...action.payload, id}]}; }
  if (K==='UPD_AVAL')  return {...state, avaliacoes: state.avaliacoes.map(a=>a.id===action.payload.id?{...a,...action.payload}:a)};
  if (K==='DEL_AVAL')  return {...state, avaliacoes: state.avaliacoes.filter(a=>a.id!==action.payload)};
  if (K==='ADD_REQ')   { const id = 'r'+Date.now().toString(36); return {...state, requisitos:[...state.requisitos, {...action.payload, id}]}; }
  if (K==='UPD_REQ')   return {...state, requisitos: state.requisitos.map(r=>r.id===action.payload.id?{...r,...action.payload}:r)};
  if (K==='DEL_REQ')   return {...state, requisitos: state.requisitos.filter(r=>r.id!==action.payload)};
  if (K==='APPLY_REQ') {
    const created = [];
    state.colaboradores.forEach(c => {
      const reqs = state.requisitos.filter(r => r.funcao===c.funcao && r.nivel===c.nivel);
      reqs.forEach(r => {
        const exists = state.avaliacoes.some(a => a.colaboradorId===c.id && a.competenciaId===r.competenciaId);
        if (!exists) created.push({
          id:'a'+Date.now().toString(36)+Math.random().toString(36).slice(2,7),
          colaboradorId:c.id, competenciaId:r.competenciaId,
          peso:r.peso, atual:0, esperado:r.esperado,
          plano:'', responsavel:'', prazo:'', carreira:'',
          dataAvaliacao: new Date().toISOString().slice(0,10)
        });
      });
    });
    return {...state, avaliacoes:[...state.avaliacoes, ...created]};
  }
  if (K==='ADD_SNAP')  { const id = 's'+Date.now().toString(36); return {...state, snapshots:[...state.snapshots, {id, data:new Date().toISOString(), descricao:action.payload||'Snapshot', avaliacoes:JSON.parse(JSON.stringify(state.avaliacoes))}]}; }
  if (K==='DEL_SNAP')  return {...state, snapshots: state.snapshots.filter(s=>s.id!==action.payload)};
  if (K==='UPD_CFG')   return {...state, config: {...state.config, ...action.payload}};
  if (K==='IMPORT')    return {...state, ...action.payload};
  if (K==='LOAD')      return {...action.payload, currentUser:state.currentUser, authLoading:false};
  if (K==='RESET')     return {...initialState(), currentUser:state.currentUser, authLoading:false};
  if (K==='SET_AUTH_USER') {
    const p = action.payload;
    if (!p) return {...state, currentUser:null, loginError:null, authLoading:false};
    return {...state, currentUser:{id:p.id,nome:p.nome,email:p.email,papel:p.papel}, loginError:null, authLoading:false};
  }
  if (K==='SET_PROFILES') {
    return {...state, users: action.payload};
  }
  if (K==='SET_AUTH_LOADING') return {...state, authLoading: !!action.payload};
  if (K==='SET_LOGIN_ERROR') return {...state, loginError: action.payload || null, authLoading:false};
  if (K==='LOGOUT')    return {...state, currentUser:null, loginError:null, authLoading:false};
  if (K==='CLR_ERR')   return {...state, loginError:null};
  if (K==='LOAD_DATA') return {
    ...state,
    colaboradores: action.payload.colaboradores || state.colaboradores,
    competencias:  action.payload.competencias  || state.competencias,
    avaliacoes:    action.payload.avaliacoes    || state.avaliacoes,
    requisitos:    action.payload.requisitos    || state.requisitos,
  };
  return state;
}

const avalToDb = a => ({id:a.id, colaborador_id:a.colaboradorId, competencia_id:a.competenciaId, peso:a.peso, atual:a.atual, esperado:a.esperado, plano:a.plano||null, responsavel:a.responsavel||null, prazo:a.prazo||null, carreira:a.carreira||null, data_avaliacao:a.dataAvaliacao||null});
const avalFromDb = a => ({id:a.id, colaboradorId:a.colaborador_id, competenciaId:a.competencia_id, peso:a.peso, atual:a.atual, esperado:a.esperado, plano:a.plano||'', responsavel:a.responsavel||'', prazo:a.prazo||'', carreira:a.carreira||'', dataAvaliacao:a.data_avaliacao||''});
const reqToDb = r => ({id:r.id, funcao:r.funcao, nivel:r.nivel, competencia_id:r.competenciaId, esperado:r.esperado, peso:r.peso});
const reqFromDb = r => ({id:r.id, funcao:r.funcao, nivel:r.nivel, competenciaId:r.competencia_id, esperado:r.esperado, peso:r.peso});

async function loadDataFromCloud(dispatch, seedFallback) {
  try {
    const [c, cp, a, r] = await Promise.all([
      sb.from('colaboradores').select('*').order('id'),
      sb.from('competencias').select('*').order('id'),
      sb.from('avaliacoes').select('*'),
      sb.from('requisitos').select('*'),
    ]);
    if (c.error || cp.error || a.error || r.error) throw (c.error || cp.error || a.error || r.error);
    const total = (c.data?.length||0) + (cp.data?.length||0) + (a.data?.length||0) + (r.data?.length||0);
    if (total === 0 && seedFallback) {
      console.log('[cloud] DB vazia. A semear com SEED_*');
      await Promise.all([
        sb.from('colaboradores').upsert(seedFallback.colaboradores),
        sb.from('competencias').upsert(seedFallback.competencias),
        sb.from('avaliacoes').upsert(seedFallback.avaliacoes.map(avalToDb)),
        sb.from('requisitos').upsert(seedFallback.requisitos.map(reqToDb)),
      ]);
      dispatch({type:'LOAD_DATA', payload: seedFallback});
      return { seeded: true };
    }
    dispatch({type:'LOAD_DATA', payload: {
      colaboradores: c.data || [],
      competencias:  cp.data || [],
      avaliacoes:    (a.data || []).map(avalFromDb),
      requisitos:    (r.data || []).map(reqFromDb),
    }});
    return { seeded: false };
  } catch(e) {
    console.warn('[cloud] load falhou', e);
    return { error: e };
  }
}

async function syncTableDiff(table, localRows, mapToDb) {
  const { data: dbIdsRaw, error: e1 } = await sb.from(table).select('id');
  if (e1) throw e1;
  const localIds = new Set(localRows.map(x => x.id));
  const toDelete = (dbIdsRaw || []).map(x => x.id).filter(id => !localIds.has(id));
  if (toDelete.length) {
    const { error: e2 } = await sb.from(table).delete().in('id', toDelete);
    if (e2) throw e2;
  }
  if (localRows.length) {
    const { error: e3 } = await sb.from(table).upsert(localRows.map(mapToDb));
    if (e3) throw e3;
  }
}

async function syncDataToCloud(state) {
  try {
    await Promise.all([
      syncTableDiff('colaboradores', state.colaboradores, x => x),
      syncTableDiff('competencias',  state.competencias,  x => x),
      syncTableDiff('avaliacoes',    state.avaliacoes,    avalToDb),
      syncTableDiff('requisitos',    state.requisitos,    reqToDb),
    ]);
    return { ok: true };
  } catch(e) {
    console.warn('[cloud] sync falhou', e);
    return { ok: false, error: e };
  }
}

function Modal({open, onClose, title, children, wide=false}) {

/* ---------- AVATAR + PHOTO EDITOR ---------- */
function colorFromString(s) {
  let h = 0; for (let i=0;i<s.length;i++) h = (h*31 + s.charCodeAt(i)) >>> 0;
  const palette = ['bg-brand-500','bg-emerald-500','bg-amber-500','bg-rose-500','bg-violet-500','bg-sky-500','bg-teal-500','bg-indigo-500','bg-fuchsia-500','bg-orange-500'];
  return palette[h % palette.length];
}
function initialsOf(name) {
  return String(name||'?').trim().split(/\s+/).map(w=>w[0]).filter(Boolean).slice(0,2).join('').toUpperCase() || '?';
}
function Avatar({colab, size=32, onClick, class:cls=''}) {
  const sz = typeof size==='number' ? size : 32;
  const txt = sz>=64?'text-xl':sz>=48?'text-base':sz>=32?'text-xs':'text-[10px]';
  const url = colab?.foto_url;
  const initials = initialsOf(colab?.nome);
  const bg = colorFromString(colab?.nome||'?');
  const ring = onClick ? 'cursor-pointer hover:ring-2 hover:ring-brand-300' : '';
  const style = {width: sz+'px', height: sz+'px', minWidth: sz+'px'};
  if (url) {
    return html`<img src=${url} alt=${colab?.nome||''} title=${colab?.nome||''} onClick=${onClick} style=${style} class=${'rounded-full object-cover bg-ink-100 '+ring+' '+cls}/>`;
  }
  return html`<div onClick=${onClick} style=${style} title=${colab?.nome||''} class=${'rounded-full flex items-center justify-center text-white font-semibold select-none '+bg+' '+txt+' '+ring+' '+cls}>${initials}</div>`;
}

const FOTO_BUCKET = 'colab-fotos';
async function uploadColabFoto(colab, blob) {
  const ext = blob.type === 'image/png' ? 'png' : 'jpg';
  const path = `colab-${colab.id}-${Date.now()}.${ext}`;
  const { error: upErr } = await sb.storage.from(FOTO_BUCKET).upload(path, blob, { contentType: blob.type, upsert: true });
  if (upErr) throw upErr;
  const { data } = sb.storage.from(FOTO_BUCKET).getPublicUrl(path);
  return data.publicUrl;
}

function PhotoEditor({colab, onSave, onClose}) {
  const imgRef = useRef(null);
  const cropperRef = useRef(null);
  const fileRef = useRef(null);
  const [src, setSrc] = useState(colab?.foto_url || '');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');

  useEffect(() => {
    if (!src || !imgRef.current) return;
    if (cropperRef.current) { try { cropperRef.current.destroy(); } catch(e){} }
    cropperRef.current = new window.Cropper(imgRef.current, {
      aspectRatio: 1,
      viewMode: 1,
      autoCropArea: 0.9,
      background: false,
      movable: true,
      zoomable: true,
      rotatable: true,
      scalable: false,
      cropBoxResizable: true,
      responsive: true,
    });
    return () => { try { cropperRef.current?.destroy(); } catch(e){} cropperRef.current = null; };
  }, [src]);

  const onPick = (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    if (!f.type.startsWith('image/')) { setErr('Selecciona uma imagem.'); return; }
    if (f.size > 8 * 1024 * 1024) { setErr('Imagem demasiado grande (>8MB).'); return; }
    setErr('');
    const reader = new FileReader();
    reader.onload = (ev) => setSrc(ev.target.result);
    reader.readAsDataURL(f);
  };

  const save = async () => {
    if (!cropperRef.current) { setErr('Carrega uma imagem primeiro.'); return; }
    setBusy(true); setErr('');
    try {
      const canvas = cropperRef.current.getCroppedCanvas({ width: 512, height: 512, imageSmoothingQuality: 'high' });
      const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.88));
      const url = await uploadColabFoto(colab, blob);
      onSave(url);
    } catch(e) {
      setErr(e.message || 'Erro ao guardar.');
    }
    setBusy(false);
  };

  const removePhoto = () => {
    if (!confirm('Remover a foto deste colaborador?')) return;
    onSave('');
  };

  return html`
    <div class="space-y-4">
      <div class="flex items-center gap-3">
        <input ref=${fileRef} type="file" accept="image/*" class="hidden" onChange=${onPick}/>
        <${Button} variant="outline" onClick=${()=>fileRef.current?.click()}>Escolher imagem</${Button}>
        ${cropperRef.current && html`
          <${Button} size="sm" variant="outline" onClick=${()=>cropperRef.current.rotate(-90)}>↺</${Button}>
          <${Button} size="sm" variant="outline" onClick=${()=>cropperRef.current.rotate(90)}>↻</${Button}>
          <${Button} size="sm" variant="outline" onClick=${()=>cropperRef.current.zoom(0.1)}>+</${Button}>
          <${Button} size="sm" variant="outline" onClick=${()=>cropperRef.current.zoom(-0.1)}>−</${Button}>
          <${Button} size="sm" variant="outline" onClick=${()=>cropperRef.current.reset()}>Reset</${Button}>`}
      </div>
      ${src ? html`
        <div class="max-h-[480px] overflow-hidden rounded-lg border border-ink-200 bg-ink-50">
          <img ref=${imgRef} src=${src} style=${{maxWidth:'100%', display:'block'}}/>
        </div>
        <div class="text-xs text-ink-500">Arrasta para reposicionar. Usa as setas/botões para rodar e fazer zoom. A área dentro do quadrado vai ficar como foto de perfil.</div>` : html`
        <div class="rounded-lg border-2 border-dashed border-ink-200 p-12 text-center text-ink-400">
          Sem foto ainda. Carrega uma imagem para começar.
        </div>`}
      ${err && html`<div class="p-2 rounded bg-rose-50 text-rose-700 text-sm">${err}</div>`}
      <div class="flex justify-between items-center pt-2 border-t border-ink-100">
        ${colab?.foto_url ? html`<${Button} variant="ghost" onClick=${removePhoto} class="text-rose-600 hover:bg-rose-50">Remover foto</${Button}>` : html`<div></div>`}
        <div class="flex gap-2">
          <${Button} variant="outline" onClick=${onClose}>Cancelar</${Button}>
          <${Button} onClick=${save} disabled=${busy || !src}>${busy?'A guardar…':'Guardar foto'}</${Button}>
        </div>
      </div>
    </div>`;
}

/* ---------- CHART ---------- */
function ChartView({type, data, options, height=260}) {
  const ref = useRef(null); const inst = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (inst.current) inst.current.destroy();
    inst.current = new Chart(ref.current, {type, data, options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{family:'Inter',size:11}, color:'#475569'}}},
      scales: (type==='bar'||type==='line') ? {
        x:{ticks:{font:{family:'Inter',size:10},color:'#64748b'}, grid:{color:'#f1f5f9'}},
        y:{ticks:{font:{family:'Inter',size:10},color:'#64748b'}, grid:{color:'#f1f5f9'}, beginAtZero:true}
      } : undefined, ...options
    }});
    return () => { if (inst.current) inst.current.destroy(); };
  }, [type, JSON.stringify(data), JSON.stringify(options)]);
  return html`<div style=${{height:height+'px'}}><canvas ref=${ref}></canvas></div>`;
}

/* ---------- TOPBAR ---------- */
function findHeaderRow(sheet) {
  const ref = sheet['!ref']; if (!ref) return 0;
  const range = XLSX.utils.decode_range(ref);
  for (let R=range.s.r; R<=Math.min(range.e.r, range.s.r+30); R++) {
    for (let C=range.s.c; C<=range.e.c; C++) {
      const cell = sheet[XLSX.utils.encode_cell({r:R,c:C})];
      if (cell && String(cell.v).toLowerCase().includes('colaborador')) return R;
    }
  }
  return 0;
}

function TopBar({state, dispatch, title, subtitle, onMenuClick}) {
  const fileRef = useRef(null);
  const onImport = async (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    const data = await f.arrayBuffer();
    const wb = XLSX.read(data);
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, {defval:null, range: findHeaderRow(sheet)});
    const colabs = [], avals = [];
    const comps = [...state.competencias];
    rows.forEach((r,i) => {
      const nome = r['Colaborador'] || r['Nome'];
      if (!nome) return;
      const id = i+1;
      colabs.push({id, nome:String(nome).trim(), dep:r['Departamento']||'', funcao:r['Função']||r['Funcao']||'', nivel:r['Nível']||r['Nivel']||'Pl', site:r['SITE']||r['Site']||'', potencial:2,foto_url:""});
      const tec = r['Competência Técnica']||r['Competencia Tecnica'];
      const comp = r['Competência Comportamental']||r['Competencia Comportamental'];
      [[tec,'Técnica'],[comp,'Comportamental']].forEach(([nm,tipo]) => {
        if (!nm) return;
        let c = comps.find(x=>x.nome.toLowerCase().trim()===String(nm).toLowerCase().trim());
        if (!c) { c = {id:'c'+Date.now().toString(36)+Math.random().toString(36).slice(2,6), nome:String(nm).trim(), tipo, iso:r['ISO Relacionada']||''}; comps.push(c); }
        avals.push({id:'a'+Date.now().toString(36)+Math.random().toString(36).slice(2,6), colaboradorId:id, competenciaId:c.id, peso:Number(r['Peso (%)']||0), atual:Number(r['Nível Atual']||0), esperado:Number(r['Nível Esperado']||0), plano:r['Plano']||'', responsavel:r['Responsável']||'', prazo:String(r['Prazo']||''), carreira:r['Plano de Carreira']||'', dataAvaliacao:new Date().toISOString().slice(0,10)});
      });
    });
    if (colabs.length) {
      dispatch({type:'IMPORT', payload:{colaboradores:colabs, competencias:comps, avaliacoes: avals.length? avals : state.avaliacoes}});
      alert(`Importados: ${colabs.length} colaboradores · ${comps.length} competências · ${avals.length} avaliações.`);
    } else alert('Nenhum colaborador encontrado no ficheiro.');
    e.target.value='';
  };
  const onExport = () => {
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(state.colaboradores.map(c=>({ID:c.id,Colaborador:c.nome,Departamento:c.dep,Função:c.funcao,Nível:c.nivel,Site:c.site,Potencial:POTENCIAL_LABEL[c.potencial]}))), 'Colaboradores');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(state.competencias.map(c=>({ID:c.id,Competência:c.nome,Tipo:c.tipo,ISO:c.iso||''}))), 'Competências');
    const rows = state.avaliacoes.map(a => {
      const col = state.colaboradores.find(c=>c.id===a.colaboradorId) || {};
      const comp = state.competencias.find(c=>c.id===a.competenciaId) || {};
      return {Colaborador:col.nome, Departamento:col.dep, Função:col.funcao, Nível:col.nivel, Site:col.site, Competência:comp.nome, Tipo:comp.tipo, ISO:comp.iso||'', 'Peso (%)':a.peso, 'Nível Atual':a.atual, 'Nível Esperado':a.esperado, Gap:gap(a), Score:Number(score(a).toFixed(2)), Plano:a.plano||'', Responsável:a.responsavel||'', Prazo:a.prazo||'', 'Plano de Carreira':a.carreira||'', 'Data Avaliação':a.dataAvaliacao||''};
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), 'Matriz');
    XLSX.writeFile(wb, 'matriz_competencias.xlsx');
  };
  return html`
    <header class="h-16 bg-white border-b border-ink-100 px-3 sm:px-6 flex items-center justify-between gap-2 no-print">
      <div class="flex items-center gap-2 min-w-0 flex-1">
        <button onClick=${onMenuClick} class="md:hidden p-2 rounded-lg hover:bg-ink-100 text-ink-700 shrink-0" title="Menu"><${Icon.Menu} size=${20}/></button>
        <div class="min-w-0">
          <h1 class="text-base sm:text-lg font-semibold text-ink-900 truncate">${title}</h1>
          ${subtitle && html`<p class="hidden sm:block text-xs text-ink-500 truncate">${subtitle}</p>`}
        </div>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <input ref=${fileRef} type="file" accept=".xlsx,.xls" class="hidden" onChange=${onImport}/>
        <${Button} variant="outline" size="sm" onClick=${()=>fileRef.current.click()} title="Importar"><${Icon.Upload} size=${16}/> <span class="hidden sm:inline">Importar</span></${Button}>
        <${Button} variant="outline" size="sm" onClick=${onExport} title="Exportar Excel"><${Icon.Download} size=${16}/> <span class="hidden sm:inline">Excel</span></${Button}>
      </div>
    </header>`;
}

/* ---------- PDF EXPORT ---------- */
async function exportDashboardPDF(state) {
  const el = document.getElementById('printable-dashboard');
  if (!el) return alert('Dashboard não disponível.');
  const canvas = await html2canvas(el, {scale:2, backgroundColor:'#f8fafc', logging:false});
  const imgData = canvas.toDataURL('image/png');
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p','mm','a4');
  const pageW = 210, pageH = 297, margin = 15;
  // Header
  pdf.setFillColor(37,99,235); pdf.rect(0,0,pageW,25,'F');
  pdf.setTextColor(255,255,255); pdf.setFont('helvetica','bold'); pdf.setFontSize(16);
  pdf.text(state.config.empresa, margin, 12);
  pdf.setFont('helvetica','normal'); pdf.setFontSize(9);
  pdf.text('Relatório Executivo · Matriz de Competências', margin, 18);
  pdf.text(new Date().toLocaleDateString('pt-PT',{year:'numeric',month:'long',day:'2-digit'}), pageW-margin, 18, {align:'right'});
  // KPIs inline
  pdf.setTextColor(15,23,42); pdf.setFontSize(11); pdf.setFont('helvetica','bold');
  pdf.text('Indicadores principais', margin, 35);
  const total = state.colaboradores.length;
  const avaliados = uniq(state.avaliacoes.map(a=>a.colaboradorId)).length;
  const gm = state.avaliacoes.length ? (state.avaliacoes.reduce((s,a)=>s+gap(a),0)/state.avaliacoes.length) : 0;
  const sm = state.avaliacoes.length ? (state.avaliacoes.reduce((s,a)=>s+score(a),0)/state.avaliacoes.length) : 0;
  pdf.setFont('helvetica','normal'); pdf.setFontSize(9);
  const kpis = [['Colaboradores',total],['Cobertura',Math.round((avaliados/Math.max(1,total))*100)+'%'],['Gap médio',gm.toFixed(2)],['Score médio',sm.toFixed(1)]];
  kpis.forEach((k,i) => {
    const x = margin + i*45;
    pdf.setDrawColor(226,232,240); pdf.roundedRect(x, 38, 42, 15, 2, 2, 'S');
    pdf.setFontSize(7); pdf.setTextColor(100,116,139); pdf.text(k[0].toUpperCase(), x+3, 43);
    pdf.setFontSize(14); pdf.setTextColor(15,23,42); pdf.setFont('helvetica','bold'); pdf.text(String(k[1]), x+3, 50);
    pdf.setFont('helvetica','normal');
  });
  // Image
  const imgW = pageW - 2*margin; const imgH = (canvas.height * imgW) / canvas.width;
  pdf.addImage(imgData, 'PNG', margin, 58, imgW, Math.min(imgH, pageH-70));
  // Footer
  pdf.setFontSize(8); pdf.setTextColor(100,116,139);
  pdf.text('Gerado pela app Matriz de Competências · Página 1', margin, pageH-8);
  pdf.save(`relatorio-matriz-${new Date().toISOString().slice(0,10)}.pdf`);
}

function Dashboard({state}) {
  const { colaboradores, competencias, avaliacoes } = state;
  const total = colaboradores.length;
  const avaliados = uniq(avaliacoes.map(a=>a.colaboradorId)).length;
  const cobertura = total ? Math.round((avaliados/total)*100) : 0;
  const gapMedio = avaliacoes.length ? (avaliacoes.reduce((s,a)=>s+gap(a),0)/avaliacoes.length) : 0;
  const scoreMedio = avaliacoes.length ? (avaliacoes.reduce((s,a)=>s+score(a),0)/avaliacoes.length) : 0;
  const gapsByDep = {};
  avaliacoes.forEach(a => { const c = colaboradores.find(x=>x.id===a.colaboradorId); if (!c) return; if (!gapsByDep[c.dep]) gapsByDep[c.dep]={sum:0,n:0}; gapsByDep[c.dep].sum+=gap(a); gapsByDep[c.dep].n++; });
  const depLabels = Object.keys(gapsByDep);
  const depValues = depLabels.map(k => +(gapsByDep[k].sum/gapsByDep[k].n).toFixed(2));
  const siteCount = {};
  colaboradores.forEach(c => siteCount[c.site||'—'] = (siteCount[c.site||'—']||0)+1);
  const topGaps = [...avaliacoes].sort((a,b)=>gap(b)-gap(a)).slice(0,10).map(a=>{
    const c = colaboradores.find(x=>x.id===a.colaboradorId)||{}; const k = competencias.find(x=>x.id===a.competenciaId)||{};
    return {colabObj:c, colab:c.nome, dep:c.dep, comp:k.nome, gap:gap(a), atual:a.atual, esperado:a.esperado};
  });

  return html`
    <div class="p-6 space-y-6 fade-in">
      <div class="flex items-center justify-between no-print">
        <div class="text-sm text-ink-500">Última atualização: ${new Date().toLocaleString('pt-PT')}</div>
        <${Button} variant="primary" onClick=${()=>exportDashboardPDF(state)}>
          <${Icon.FileText} size=${16}/> Exportar PDF Executivo

      </div>

      <div id="printable-dashboard" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
          <${Stat} label="Colaboradores" value=${total} sub=${`${uniq(colaboradores.map(c=>c.dep)).length} departamentos`} tone="brand" icon=${html`<${Icon.Users}/>`}/>
          <${Stat} label="Cobertura da matriz" value=${cobertura+'%'} sub=${`${avaliados} de ${total} avaliados`} tone="emerald" icon=${html`<${Icon.Target}/>`}/>
          <${Stat} label="Gap médio" value=${gapMedio.toFixed(2)} sub="Escala 0–4" tone="amber" icon=${html`<${Icon.Trend}/>`}/>
          <${Stat} label="Score médio" value=${scoreMedio.toFixed(1)} sub="Peso × Nível / 5" tone="violet" icon=${html`<${Icon.Star}/>`}/>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
          <${Card} class="lg:col-span-2 p-5">
            <h3 class="font-semibold text-ink-900">Gap médio por departamento</h3>
            <p class="text-xs text-ink-500 mb-3">Áreas com maior necessidade de desenvolvimento</p>
            ${depLabels.length ? html`
              <${ChartView} type="bar" height=${280} data=${{labels:depLabels, datasets:[{label:'Gap médio', data:depValues, backgroundColor:'#2563eb', borderRadius:6, maxBarThickness:34}]}} options=${{plugins:{legend:{display:false}}}}/>
            ` : html`<${EmptyState} icon=${html`<${Icon.Trend}/>`} title="Sem avaliações" hint="Cria avaliações para veres o gráfico."/>`}
          </${Card}>
          <${Card} class="p-5">
            <h3 class="font-semibold text-ink-900 mb-3">Distribuição por Site</h3>
            <${ChartView} type="doughnut" height=${280} data=${{labels:Object.keys(siteCount), datasets:[{data:Object.values(siteCount), backgroundColor:['#2563eb','#0ea5e9','#8b5cf6','#f59e0b','#10b981']}]}} options=${{cutout:'60%',plugins:{legend:{position:'bottom'}}}}/>
          </${Card}>
        </div>

        <${Card} class="p-5">
          <h3 class="font-semibold text-ink-900">Top 10 gaps críticos</h3>
          <p class="text-xs text-ink-500 mb-4">Ordenados pela maior diferença entre esperado e atual</p>
          ${topGaps.length ? html`
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead><tr class="text-left text-xs font-medium text-ink-500 uppercase tracking-wide border-b border-ink-100">
                  <th class="py-2 pr-4">Colaborador</th><th class="py-2 pr-4">Departamento</th><th class="py-2 pr-4">Competência</th>
                  <th class="py-2 pr-4 text-center">Atual</th><th class="py-2 pr-4 text-center">Esperado</th><th class="py-2 pr-4 text-center">Gap</th>
                </tr></thead>
                <tbody>
                  ${topGaps.map((r,i)=>html`
                    <tr key=${i} class="border-b border-ink-50">
                      <td class="py-2.5 pr-4 font-medium text-ink-800">
                        <div class="flex items-center gap-2"><${Avatar} colab=${r.colabObj} size=${24}/><span>${r.colab}</span></div>
                      </td>
                      <td class="py-2.5 pr-4 text-ink-600">${r.dep}</td>
                      <td class="py-2.5 pr-4 text-ink-600">${r.comp}</td>
                      <td class="py-2.5 pr-4 text-center tabular-nums">${r.atual}</td>
                      <td class="py-2.5 pr-4 text-center tabular-nums">${r.esperado}</td>

                    </tr>`)}
                </tbody>
              </table>
            </div>
          ` : html`<${EmptyState} icon=${html`<${Icon.Clipboard}/>`} title="Sem avaliações" hint="Cria avaliações na secção 'Avaliações'."/>`}
        </${Card}>

function Colaboradores({state, dispatch}) {
  const [q, setQ] = useState('');
  const [filterDep, setFilterDep] = useState('');
  const [filterSite, setFilterSite] = useState('');
  const [filterNivel, setFilterNivel] = useState('');
  const [editing, setEditing] = useState(null);
  const [adding, setAdding] = useState(false);
  const [viewing, setViewing] = useState(null);
  const deps  = uniq(state.colaboradores.map(c=>c.dep).filter(Boolean)).sort();
  const sites = uniq(state.colaboradores.map(c=>c.site).filter(Boolean)).sort();
  const filtered = state.colaboradores.filter(c => {
    if (q && !(c.nome+' '+c.funcao+' '+c.dep).toLowerCase().includes(q.toLowerCase())) return false;
    if (filterDep && c.dep!==filterDep) return false;
    if (filterSite && c.site!==filterSite) return false;
    if (filterNivel && c.nivel!==filterNivel) return false;
    return true;
  }).sort(by('nome'));
  const avalByColab = useMemo(() => { const m={}; state.avaliacoes.forEach(a => { (m[a.colaboradorId] = m[a.colaboradorId]||[]).push(a); }); return m; }, [state.avaliacoes]);

  return html`
    <div class="p-4 sm:p-6 space-y-4 fade-in">
      <${Card} class="p-4">
        <div class="flex flex-wrap items-center gap-2">
          <div class="relative flex-1 min-w-[220px]">
            <div class="absolute left-3 top-1/2 -translate-y-1/2 text-ink-400"><${Icon.Search} size=${16}/></div>
            <${Input} class="pl-9" placeholder="Pesquisar por nome, função ou departamento…" value=${q} onInput=${e=>setQ(e.target.value)}/>
          </div>
          <${Select} value=${filterDep} onChange=${e=>setFilterDep(e.target.value)} class="w-48">
            <option value="">Todos departamentos</option>${deps.map(d=>html`<option key=${d} value=${d}>${d}</option>`)}</${Select}>
          <${Select} value=${filterSite} onChange=${e=>setFilterSite(e.target.value)} class="w-36">
            <option value="">Todos sites</option>${sites.map(s=>html`<option key=${s} value=${s}>${s}</option>`)}</${Select}>
          <${Select} value=${filterNivel} onChange=${e=>setFilterNivel(e.target.value)} class="w-32">
            <option value="">Todos níveis</option>${NIVEIS.map(n=>html`<option key=${n} value=${n}>${NIVEIS_LABEL[n]}</option>`)}</${Select}>
          <${Button} onClick=${()=>setAdding(true)}><${Icon.Plus} size=${16}/> Novo</${Button}>
        </div>
        <div class="mt-3 text-xs text-ink-500">${filtered.length} de ${state.colaboradores.length} colaboradores</div>
      </${Card}>

      <${Card}>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead><tr class="text-left text-xs font-medium text-ink-500 uppercase tracking-wide border-b border-ink-100 bg-ink-50/50">
              <th class="px-4 py-3">Colaborador</th><th class="px-4 py-3">Departamento</th><th class="px-4 py-3">Função</th>
              <th class="px-4 py-3">Nível</th><th class="px-4 py-3">Site</th><th class="px-4 py-3">Potencial</th>
              <th class="px-4 py-3 text-center">Aval.</th><th class="px-4 py-3 text-center">Gap</th><th class="px-4 py-3 text-right">Ações</th>
            </tr></thead>
            <tbody>
              ${filtered.map(c => {
                const avs = avalByColab[c.id]||[];
                const gm = avs.length ? (avs.reduce((s,a)=>s+gap(a),0)/avs.length) : null;
                return html`
                <tr key=${c.id} class="border-b border-ink-50 hover:bg-ink-50/60">
                  <td class="px-4 py-3">
                    <button onClick=${()=>setViewing(c)} class="flex items-center gap-3 text-left group">
                      <${Avatar} colab=${c} size=${32}/>
                      <div class="font-medium text-ink-800 group-hover:text-brand-600 group-hover:underline">${c.nome}</div>
                    </button>
                  </td>
                  <td class="px-4 py-3 text-ink-600">${c.dep}</td>
                  <td class="px-4 py-3 text-ink-600">${c.funcao}</td>
                  <td class="px-4 py-3"><${Badge} color=${c.nivel==='Sr'?'violet':c.nivel==='Pl'?'brand':'emerald'}>${NIVEIS_LABEL[c.nivel]||c.nivel}</${Badge}></td>
                  <td class="px-4 py-3 text-ink-600">${c.site}</td>
                  <td class="px-4 py-3"><${Badge} color=${c.potencial===3?'emerald':c.potencial===2?'amber':'ink'}>${POTENCIAL_LABEL[c.potencial||2]}</${Badge}></td>
                  <td class="px-4 py-3 text-center tabular-nums text-ink-700">${avs.length}</td>
                  <td class="px-4 py-3 text-center">
                    ${gm===null ? html`<span class="text-ink-400">—</span>` : html`<span class=${'inline-flex items-center justify-center min-w-[32px] h-7 px-2 rounded-full text-white text-xs font-semibold '+gapClass(Math.round(gm))}>${gm.toFixed(1)}</span>`}
                  </td>
                  <td class="px-4 py-3 text-right">
                    <button onClick=${()=>setEditing(c)} class="p-1.5 rounded hover:bg-ink-100 text-ink-500"><${Icon.Edit} size=${16}/></button>
                    <button onClick=${()=>{if(confirm('Remover '+c.nome+'?')) dispatch({type:'DEL_COLAB',payload:c.id});}} class="p-1.5 rounded hover:bg-rose-50 text-rose-500"><${Icon.Trash} size=${16}/></button>
                  </td>
                </tr>`;
              })}
            </tbody>
          </table>
          ${!filtered.length && html`<${EmptyState} icon=${html`<${Icon.Users}/>`} title="Sem resultados" hint="Ajusta os filtros."/>`}
        </div>
      </${Card}>

      <${Modal} open=${adding} onClose=${()=>setAdding(false)} title="Novo colaborador">
        <${ColabForm} state=${state} onSave=${f=>dispatch({type:'ADD_COLAB',payload:f})} onClose=${()=>setAdding(false)}/>

      <${Modal} open=${!!editing} onClose=${()=>setEditing(null)} title="Editar colaborador">
        ${editing && html`<${ColabForm} value=${editing} state=${state} onSave=${f=>dispatch({type:'UPD_COLAB',payload:{...f,id:editing.id}})} onClose=${()=>setEditing(null)}/>`}
      </${Modal}>
      <${Modal} open=${!!viewing} onClose=${()=>setViewing(null)} title="Ficha do colaborador" wide=${true}>
        ${viewing && html`<${ColabDetalhe} colab=${viewing} state=${state} dispatch=${dispatch} onClose=${()=>setViewing(null)} onEdit=${(c)=>setEditing(c)}/>`}
      </${Modal}>
    </div>`;
}

  const colabs = state.colaboradores.filter(c => (!filterDep||c.dep===filterDep) && (!filterSite||c.site===filterSite));
  const comps = state.competencias.filter(c => !filterTipo || c.tipo===filterTipo);
  const byPair = {}; state.avaliacoes.forEach(a => { byPair[a.colaboradorId+'_'+a.competenciaId] = a; });
  const filteredColabs = showOnly==='com' ? colabs.filter(c => state.avaliacoes.some(a=>a.colaboradorId===c.id)) : colabs;
  const headerStyle = {writingMode:'vertical-rl', transform:'rotate(180deg)', whiteSpace:'nowrap', maxHeight:'140px'};

  return html`

        <div class="flex flex-wrap items-center gap-2">
          <${Select} value=${filterDep} onChange=${e=>setFilterDep(e.target.value)} class="w-48">
            <option value="">Todos departamentos</option>${deps.map(d=>html`<option key=${d} value=${d}>${d}</option>`)}</${Select}>
          <${Select} value=${filterSite} onChange=${e=>setFilterSite(e.target.value)} class="w-36">

          <${Select} value=${filterTipo} onChange=${e=>setFilterTipo(e.target.value)} class="w-52">
            <option value="">Todas as competências</option><option value="Técnica">Apenas técnicas</option><option value="Comportamental">Apenas comportamentais</option></${Select}>
          <${Select} value=${showOnly} onChange=${e=>setShowOnly(e.target.value)} class="w-52">
            <option value="com">Só colaboradores avaliados</option><option value="all">Todos os colaboradores</option></${Select}>
          <div class="ml-auto flex items-center gap-3 text-xs text-ink-500">
            <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-emerald-500"></span>0</span>
            <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-lime-500"></span>1</span>
            <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-amber-500"></span>2</span>
            <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-orange-500"></span>3</span>
            <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-rose-600"></span>4+</span>
          </div>
        </div>
      </${Card}>

      <${Card} class="p-0 overflow-hidden">
        <div class="overflow-auto max-h-[70vh]">
          <table class="min-w-full text-xs">
            <thead class="sticky top-0 z-10">
              <tr class="bg-white border-b border-ink-100">
                <th class="sticky left-0 z-20 bg-white px-4 py-3 text-left font-semibold text-ink-700 border-r border-ink-100 min-w-[220px]">Colaborador</th>
                ${comps.map(c => html`
                  <th key=${c.id} class="px-1 py-3 text-center font-medium text-ink-600 min-w-[40px]">
                    <div class="inline-block" style=${headerStyle}>${c.nome}</div>
                  </th>`)}
              </tr>
            </thead>
            <tbody>
              ${filteredColabs.map(c => html`
                <tr key=${c.id} class="border-b border-ink-50 hover:bg-ink-50/50">
                  <td class="sticky left-0 bg-white hover:bg-ink-50/50 px-3 py-2 text-ink-800 font-medium border-r border-ink-100">

                    if (!a) return html`<td key=${k.id} class="p-1"><div class="w-7 h-7 rounded border border-dashed border-ink-200 mx-auto"></div></td>`;
                    const g = gap(a);
                    return html`<td key=${k.id} class="p-1">
                      <div class=${'heatcell w-7 h-7 mx-auto rounded text-white text-[10px] font-bold flex items-center justify-center cursor-help '+gapClass(g)}
                           title=${c.nome+' · '+k.nome+' · Atual: '+a.atual+' · Esperado: '+a.esperado+' · Gap: '+g}>${a.atual}</div>
                    </td>`;
                  })}
                </tr>`)}
            </tbody>
          </table>
          ${!filteredColabs.length && html`<div class="p-10"><${EmptyState} icon=${html`<${Icon.Grid}/>`} title="Matriz vazia" hint="Sem dados para os filtros selecionados."/></div>`}
        </div>
      </${Card}>
    </div>`;
}

/* ---------- PAGE · AVALIAÇÕES ---------- */
function AvalForm({value, onSave, onClose, state}) {
  const [f, setF] = useState(value || {colaboradorId:'',competenciaId:'',peso:10,atual:3,esperado:5,plano:'',responsavel:'',prazo:'',carreira:'',dataAvaliacao:new Date().toISOString().slice(0,10)});
  // Auto-preencher esperado+peso com base no requisito (colab.funcao + colab.nivel + competenciaId)
  useEffect(() => {
    if (!f.colaboradorId || !f.competenciaId) return;
    const c = state.colaboradores.find(x=>x.id===Number(f.colaboradorId));
    if (!c) return;
    const r = state.requisitos.find(x=>x.funcao===c.funcao && x.nivel===c.nivel && x.competenciaId===f.competenciaId);
    if (r && (!value || (f.esperado===5 && f.peso===10))) setF(prev => ({...prev, esperado:r.esperado, peso:r.peso}));
  }, [f.colaboradorId, f.competenciaId]);

  const sugerido = (() => {
    if (!f.colaboradorId || !f.competenciaId) return null;
    const c = state.colaboradores.find(x=>x.id===Number(f.colaboradorId));
    if (!c) return null;
    return state.requisitos.find(x=>x.funcao===c.funcao && x.nivel===c.nivel && x.competenciaId===f.competenciaId);
  })();

  return html`
    <div class="space-y-4">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <${Field} label="Colaborador"><${Select} value=${f.colaboradorId} onChange=${e=>setF({...f,colaboradorId:Number(e.target.value)})}>
          <option value="">Selecionar…</option>
          ${[...state.colaboradores].sort(by('nome')).map(c=>html`<option key=${c.id} value=${c.id}>${c.nome} (${c.dep})</option>`)}</${Select}></${Field}>
        <${Field} label="Competência"><${Select} value=${f.competenciaId} onChange=${e=>setF({...f,competenciaId:e.target.value})}>
          <option value="">Selecionar…</option>
          ${state.competencias.map(c=>html`<option key=${c.id} value=${c.id}>${c.nome} · ${c.tipo}</option>`)}</${Select}></${Field}>
      </div>
      ${sugerido && html`
        <div class="p-3 rounded-lg bg-brand-50 border border-brand-100 text-sm text-brand-700 flex items-center gap-2">
          <${Icon.Zap} size=${16}/>
          Requisito desta função+nível: esperado ${sugerido.esperado}, peso ${sugerido.peso}% (preenchido automaticamente)
        </div>`}
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <${Field} label="Peso (%)"><${Input} type="number" min="0" max="100" value=${f.peso} onInput=${e=>setF({...f,peso:Number(e.target.value)})}/></${Field}>
        <${Field} label="Nível Atual"><${Input} type="number" min="0" max="5" value=${f.atual} onInput=${e=>setF({...f,atual:Number(e.target.value)})}/></${Field}>
        <${Field} label="Nível Esperado"><${Input} type="number" min="0" max="5" value=${f.esperado} onInput=${e=>setF({...f,esperado:Number(e.target.value)})}/></${Field}>
        <${Field} label="Data"><${Input} type="date" value=${f.dataAvaliacao} onInput=${e=>setF({...f,dataAvaliacao:e.target.value})}/></${Field}>
      </div>
      <${Field} label="Plano de desenvolvimento"><${Input} value=${f.plano} placeholder="ex: Formação ISO 9001" onInput=${e=>setF({...f,plano:e.target.value})}/></${Field}>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
        <${Field} label="Responsável"><${Input} value=${f.responsavel} onInput=${e=>setF({...f,responsavel:e.target.value})}/></${Field}>
        <${Field} label="Prazo"><${Input} type="month" value=${f.prazo} onInput=${e=>setF({...f,prazo:e.target.value})}/></${Field}>
        <${Field} label="Plano de carreira"><${Input} value=${f.carreira} onInput=${e=>setF({...f,carreira:e.target.value})}/></${Field}>
      </div>
      <div class="flex justify-end gap-2 pt-2">
        <${Button} variant="outline" onClick=${onClose}>Cancelar</${Button}>
        <${Button} onClick=${()=>{if(!f.colaboradorId||!f.competenciaId){alert('Colaborador e competência obrigatórios');return;} onSave(f); onClose();}}>Guardar</${Button}>
      </div>
    </div>`;
}

  return html`

        <div class="flex items-center gap-2">

            <div class="absolute left-3 top-1/2 -translate-y-1/2 text-ink-400"><${Icon.Search} size=${16}/></div>

          <table class="w-full text-sm">
            <thead><tr class="text-left text-xs font-medium text-ink-500 uppercase tracking-wide border-b border-ink-100 bg-ink-50/50">
              <th class="px-4 py-3">Colaborador</th><th class="px-4 py-3">Competência</th>

                  <td class="px-4 py-3"><div class="text-ink-700">${r.compNome}</div><div class="text-xs text-ink-500">${r.tipo}</div></td>
                  <td class="px-4 py-3 text-center tabular-nums">${r.peso}%</td>
                  <td class="px-4 py-3 text-center tabular-nums">${r.atual}</td>
                  <td class="px-4 py-3 text-center tabular-nums">${r.esperado}</td>
                  <td class="px-4 py-3 text-center"><span class=${'inline-flex items-center justify-center w-7 h-7 rounded-full text-white text-xs font-semibold '+gapClass(gap(r))}>${gap(r)}</span></td>
                  <td class="px-4 py-3 text-center tabular-nums">${score(r).toFixed(1)}</td>
                  <td class="px-4 py-3 text-ink-600 truncate max-w-[200px]" title=${r.plano}>${r.plano||'—'}</td>
                  <td class="px-4 py-3 text-ink-600">${r.prazo||'—'}</td>
                  <td class="px-4 py-3 text-right">
                    <button onClick=${()=>setEditing(r)} class="p-1.5 rounded hover:bg-ink-100 text-ink-500"><${Icon.Edit} size=${16}/></button>
                    <button onClick=${()=>{if(confirm('Remover avaliação?')) dispatch({type:'DEL_AVAL',payload:r.id});}} class="p-1.5 rounded hover:bg-rose-50 text-rose-500"><${Icon.Trash} size=${16}/></button>
                  </td>
                </tr>`)}
            </tbody>
          </table>
          ${!rows.length && html`<${EmptyState} icon=${html`<${Icon.Clipboard}/>`} title="Sem avaliações" hint="Cria a primeira."/>`}
        </div>
      </${Card}>

      <${Modal} open=${adding} onClose=${()=>setAdding(false)} title="Nova avaliação" wide=${true}>
        <${AvalForm} state=${state} onSave=${f=>dispatch({type:'ADD_AVAL',payload:f})} onClose=${()=>setAdding(false)}/>
      </${Modal}>
      <${Modal} open=${!!editing} onClose=${()=>setEditing(null)} title="Editar avaliação" wide=${true}>
        ${editing && html`<${AvalForm} state=${state} value=${editing} onSave=${f=>dispatch({type:'UPD_AVAL',payload:{...f,id:editing.id}})} onClose=${()=>setEditing(null)}/>`}

/* ---------- PAGE · PLANOS ---------- */
function Planos({state}) {
  const rows = state.avaliacoes.filter(a => a.plano && gap(a)>0).map(a => {
    const c = state.colaboradores.find(x=>x.id===a.colaboradorId) || {};
    const k = state.competencias.find(x=>x.id===a.competenciaId) || {};
    return {...a, colabNome:c.nome, dep:c.dep, compNome:k.nome};
  }).sort((a,b)=>(a.prazo||'z').localeCompare(b.prazo||'z'));
  const now = new Date();
  const isLate = (p) => p && new Date(p) < now;
  const isSoon = (p) => { if (!p) return false; const d=new Date(p); const diff=(d-now)/86400000; return diff>=0 && diff<=60; };

  return html`
    <div class="p-4 sm:p-6 space-y-4 fade-in">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <${Stat} label="Planos ativos" value=${rows.length} tone="brand" icon=${html`<${Icon.Plan}/>`}/>
        <${Stat} label="Prazo em risco (≤ 60 dias)" value=${rows.filter(r=>isSoon(r.prazo)).length} tone="amber" icon=${html`<${Icon.Trend}/>`}/>
        <${Stat} label="Prazo ultrapassado" value=${rows.filter(r=>isLate(r.prazo)).length} tone="rose" icon=${html`<${Icon.Shield}/>`}/>
      </div>
      <${Card}>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead><tr class="text-left text-xs font-medium text-ink-500 uppercase tracking-wide border-b border-ink-100 bg-ink-50/50">
              <th class="px-4 py-3">Colaborador</th><th class="px-4 py-3">Competência</th>
              <th class="px-4 py-3">Plano</th><th class="px-4 py-3">Responsável</th>
              <th class="px-4 py-3">Prazo</th><th class="px-4 py-3">Carreira</th>
              <th class="px-4 py-3 text-center">Gap</th><th class="px-4 py-3 text-center">Estado</th>
            </tr></thead>
            <tbody>
              ${rows.map(r => {
                const late = isLate(r.prazo); const soon = !late && isSoon(r.prazo);
                return html`
                <tr key=${r.id} class="border-b border-ink-50 hover:bg-ink-50/60">
                  <td class="px-4 py-3 font-medium text-ink-800">${r.colabNome}<div class="text-xs text-ink-500 font-normal">${r.dep}</div></td>
                  <td class="px-4 py-3 text-ink-700">${r.compNome}</td>
                  <td class="px-4 py-3 text-ink-600">${r.plano}</td>
                  <td class="px-4 py-3 text-ink-600">${r.responsavel||'—'}</td>
                  <td class="px-4 py-3 text-ink-600">${r.prazo||'—'}</td>
                  <td class="px-4 py-3 text-ink-600">${r.carreira||'—'}</td>
                  <td class="px-4 py-3 text-center"><span class=${'inline-flex items-center justify-center w-7 h-7 rounded-full text-white text-xs font-semibold '+gapClass(gap(r))}>${gap(r)}</span></td>
                  <td class="px-4 py-3 text-center">
                    ${late ? html`<${Badge} color="rose">Em atraso</${Badge}>` : soon ? html`<${Badge} color="amber">Próximo</${Badge}>` : html`<${Badge} color="emerald">No prazo</${Badge}>`}
                  </td>
                </tr>`;
              })}
            </tbody>
          </table>
          ${!rows.length && html`<${EmptyState} icon=${html`<${Icon.Plan}/>`} title="Sem planos ativos" hint="Cria avaliações com gap > 0 e plano preenchido."/>`}
        </div>
      </${Card}>
    </div>`;
}

/* ---------- PAGE · NINE-BOX ---------- */
function NineBox({state}) {
  const [filterDep, setFilterDep] = useState('');
  const deps = uniq(state.colaboradores.map(c=>c.dep).filter(Boolean)).sort();

  const perfBucket = (colab) => {
    const avs = state.avaliacoes.filter(a=>a.colaboradorId===colab.id);
    if (!avs.length) return null;
    const pct = avs.reduce((s,a)=>s+(a.atual/5),0)/avs.length;
    return pct<0.4 ? 1 : pct<0.7 ? 2 : 3;
  };

  const colabs = state.colaboradores.filter(c => !filterDep || c.dep===filterDep);
  const grid = {}; // key "perf_pot" → [colabs]
  for (let p=1;p<=3;p++) for (let po=1;po<=3;po++) grid[p+'_'+po] = [];
  colabs.forEach(c => { const p = perfBucket(c); const po = c.potencial||2; if (p) grid[p+'_'+po].push(c); });

  const boxInfo = {
    '3_3':{label:'Estrela', color:'bg-emerald-500',desc:'Alto desempenho e alto potencial'},
    '3_2':{label:'Alto performer', color:'bg-emerald-400',desc:'Excelente desempenho, potencial médio'},
    '3_1':{label:'Especialista', color:'bg-brand-400',desc:'Desempenho alto, pouco potencial para subir'},
    '2_3':{label:'Rising star', color:'bg-brand-500',desc:'Desempenho médio, alto potencial'},
    '2_2':{label:'Core performer', color:'bg-brand-400',desc:'Consistente — base da equipa'},
    '2_1':{label:'Profissional sólido', color:'bg-ink-400',desc:'Cumpre objetivos no atual papel'},
    '1_3':{label:'Enigma', color:'bg-amber-400',desc:'Baixo desempenho, alto potencial — investigar'},
    '1_2':{label:'Inconsistente', color:'bg-amber-500',desc:'Exige apoio e acompanhamento'},
    '1_1':{label:'Em risco', color:'bg-rose-500',desc:'Requer plano de ação urgente'},
  };

  return html`
    <div class="p-4 sm:p-6 space-y-4 fade-in">
      <${Card} class="p-4 flex items-center gap-3">
        <div class="text-sm text-ink-600 mr-2">Filtrar:</div>
        <${Select} value=${filterDep} onChange=${e=>setFilterDep(e.target.value)} class="w-64">
          <option value="">Todos departamentos</option>${deps.map(d=>html`<option key=${d} value=${d}>${d}</option>`)}</${Select}>
        <div class="ml-auto text-xs text-ink-500">
          <span class="font-medium">Performance</span> = média do nível atual. <span class="font-medium">Potencial</span> definido por colaborador.
        </div>
      </${Card}>

      <${Card} class="p-5">
        <div class="flex">
          <div class="flex flex-col justify-between items-center py-8 pr-3 text-xs font-medium text-ink-500 uppercase tracking-wider" style=${{writingMode:'vertical-rl', transform:'rotate(180deg)'}}>
            <span>Alto</span><span>Médio</span><span>Baixo</span>
          </div>
          <div class="flex-1">
            <div class="text-center text-xs font-semibold text-ink-600 uppercase tracking-wider mb-2">↑ Performance</div>
            <div class="grid grid-cols-3 gap-2">
              ${[3,2,1].flatMap(p => [1,2,3].map(po => {
                const key = p+'_'+po;
                const info = boxInfo[key];
                const items = grid[key];
                return html`
                <div key=${key} class="relative rounded-xl border-2 border-ink-100 p-3 min-h-[160px] bg-ink-50/30 hover:bg-white transition">
                  <div class="flex items-center justify-between mb-2">
                    <div class=${'inline-flex items-center gap-1.5 text-[11px] font-semibold px-2 py-0.5 rounded-md text-white '+info.color}>${info.label}</div>
                    <span class="text-xs font-semibold text-ink-700 tabular-nums">${items.length}</span>
                  </div>
                  <div class="text-[10px] text-ink-500 mb-2">${info.desc}</div>
                  <div class="space-y-1 max-h-[110px] overflow-auto">
                    ${items.slice(0,6).map(c => html`
                      <div key=${c.id} class="text-xs px-2 py-1 rounded bg-white border border-ink-100 truncate" title=${c.nome+' · '+c.funcao}>${c.nome}</div>`)}
                    ${items.length>6 && html`<div class="text-[10px] text-ink-500 px-2">+${items.length-6} mais…</div>`}
                  </div>
                </div>`;
              }))}
            </div>
            <div class="grid grid-cols-3 gap-2 mt-3 text-xs font-medium text-ink-500 uppercase tracking-wider text-center">
              <div>Baixo</div><div>Médio</div><div>Alto</div>
            </div>
            <div class="text-center text-xs font-semibold text-ink-600 uppercase tracking-wider mt-1">Potencial →</div>
          </div>
        </div>
      </${Card}>
    </div>`;
}

/* ---------- PAGE · EVOLUÇÃO ---------- */
function Evolucao({state, dispatch}) {
  const snaps = [...state.snapshots].sort((a,b)=>a.data.localeCompare(b.data));
  const current = {id:'_current', data:new Date().toISOString(), descricao:'Atual', avaliacoes: state.avaliacoes};
  const serie = [...snaps, current];
  const labels = serie.map(s => s.id==='_current'?'Atual':new Date(s.data).toLocaleDateString('pt-PT'));
  const gapsMed = serie.map(s => s.avaliacoes.length ? s.avaliacoes.reduce((a,x)=>a+gap(x),0)/s.avaliacoes.length : 0);
  const scoresMed = serie.map(s => s.avaliacoes.length ? s.avaliacoes.reduce((a,x)=>a+score(x),0)/s.avaliacoes.length : 0);

  return html`
    <div class="p-4 sm:p-6 space-y-4 fade-in">
      <${Card} class="p-5">
        <div class="flex items-center justify-between mb-3">
          <div><h3 class="font-semibold text-ink-900">Evolução da Matriz</h3>
            <p class="text-xs text-ink-500">Compara snapshots históricos com o estado atual</p></div>
          <${Button} variant="primary" onClick=${()=>{const d=prompt('Descrição do snapshot:','Snapshot '+new Date().toLocaleDateString('pt-PT')); if(d) dispatch({type:'ADD_SNAP',payload:d});}}><${Icon.Copy} size=${16}/> Criar snapshot</${Button}>
        </div>
        ${serie.length>1 ? html`
          <${ChartView} type="line" height=${300} data=${{
            labels,
            datasets:[
              {label:'Gap médio', data:gapsMed, borderColor:'#dc2626', backgroundColor:'rgba(220,38,38,0.1)', tension:0.3, fill:true},
              {label:'Score médio', data:scoresMed, borderColor:'#2563eb', backgroundColor:'rgba(37,99,235,0.1)', tension:0.3, fill:true, yAxisID:'y1'}
            ]
          }} options=${{scales:{y:{position:'left',beginAtZero:true},y1:{position:'right',beginAtZero:true,grid:{drawOnChartArea:false}}}}}/>
        ` : html`<${EmptyState} icon=${html`<${Icon.Clock}/>`} title="Sem histórico" hint="Cria snapshots periódicos (ex: trimestrais) para ver a evolução ao longo do tempo."/>`}
      </${Card}>

      <${Card}>
        <div class="px-5 py-4 border-b border-ink-100"><h3 class="font-semibold text-ink-900">Snapshots</h3></div>
        <div class="divide-y divide-ink-100">
          ${snaps.length ? snaps.map(s => html`
            <div key=${s.id} class="px-5 py-3 flex items-center justify-between">
              <div>
                <div class="font-medium text-ink-800">${s.descricao}</div>
                <div class="text-xs text-ink-500">${new Date(s.data).toLocaleString('pt-PT')} · ${s.avaliacoes.length} avaliações</div>
              </div>
              <div class="flex items-center gap-2">
                <${Badge} color="brand">Gap méd. ${(s.avaliacoes.reduce((a,x)=>a+gap(x),0)/Math.max(1,s.avaliacoes.length)).toFixed(2)}</${Badge}>
                <button onClick=${()=>{if(confirm('Remover snapshot?')) dispatch({type:'DEL_SNAP',payload:s.id});}} class="p-1.5 rounded hover:bg-rose-50 text-rose-500"><${Icon.Trash} size=${16}/></button>
              </div>
            </div>`) : html`<div class="p-10"><${EmptyState} icon=${html`<${Icon.Clock}/>`} title="Ainda sem snapshots" hint="Cria um snapshot para começares a ter histórico."/></div>`}
        </div>
      </${Card}>
    </div>`;
}

/* ---------- PAGE · ADMIN ---------- */
function AdminConfig({state, dispatch}) {
  const [f, setF] = useState(state.config);
  const save = () => { dispatch({type:'UPD_CFG', payload:f}); alert('Configurações guardadas.'); };
  const onLogo = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => setF({...f, logo: reader.result});
    reader.readAsDataURL(file);
  };
  return html`
    <${Card} class="p-5">
      <h3 class="font-semibold text-ink-900 mb-4">Identidade da Organização</h3>
      <div class="space-y-4 max-w-2xl">
        <${Field} label="Nome da empresa"><${Input} value=${f.empresa} onInput=${e=>setF({...f,empresa:e.target.value})}/></${Field}>
        <${Field} label="Logo (imagem)" hint="Usado na barra lateral e relatórios PDF">
          <input type="file" accept="image/*" onChange=${onLogo} class="text-sm"/>
          ${f.logo && html`<div class="mt-2 flex items-center gap-3"><img src=${f.logo} class="w-12 h-12 rounded-lg object-cover border border-ink-200"/><${Button} size="sm" variant="ghost" onClick=${()=>setF({...f,logo:''})}>Remover</${Button}></div>`}
        </${Field}>
        <${Field} label="Cor primária"><div class="flex gap-2">
          <input type="color" value=${f.corPrimaria} onInput=${e=>setF({...f,corPrimaria:e.target.value})} class="h-10 w-20 rounded-lg border border-ink-200 cursor-pointer"/>
          <${Input} value=${f.corPrimaria} onInput=${e=>setF({...f,corPrimaria:e.target.value})}/>
        </div></${Field}>
        <${Button} onClick=${save}>Guardar</${Button}>
      </div>

async function fetchProfiles(dispatch) {

}

function AdminBackup({state, dispatch}) {
  const fileRef = useRef(null);
  const download = () => {
    const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `matriz-backup-${new Date().toISOString().slice(0,10)}.json`;

  const upload = async (e) => {

const SQL_SUPABASE = `-- Schema SQL para Supabase (cole no SQL Editor e clica em Run)

-- 1. Tabelas de dados
create table if not exists colaboradores (id int primary key, nome text, dep text, funcao text, nivel text, site text, potencial int);
create table if not exists competencias (id text primary key, nome text, tipo text, iso text);
create table if not exists avaliacoes (id text primary key, colaborador_id int, competencia_id text, peso int, atual int, esperado int, plano text, responsavel text, prazo text, carreira text, data_avaliacao date);
create table if not exists requisitos (id text primary key, funcao text, nivel text, competencia_id text, esperado int, peso int);

-- 2. Tabela de perfis (ligada ao Supabase Auth)
create table if not exists profiles (
  id uuid primary key references auth.users(id) on delete cascade,
  nome text not null,
  email text unique not null,
  papel text not null default 'usuario' check (papel in ('admin','coordenador','usuario')),
  ativo boolean not null default true,
  created_at timestamptz not null default now()
);

-- 3. RLS
alter table colaboradores enable row level security;
alter table competencias enable row level security;
alter table avaliacoes enable row level security;
alter table requisitos enable row level security;
alter table profiles enable row level security;

drop policy if exists "auth_all" on colaboradores;
drop policy if exists "auth_all" on competencias;
drop policy if exists "auth_all" on avaliacoes;
drop policy if exists "auth_all" on requisitos;
create policy "auth_all" on colaboradores for all using (auth.uid() is not null) with check (auth.uid() is not null);
create policy "auth_all" on competencias  for all using (auth.uid() is not null) with check (auth.uid() is not null);
create policy "auth_all" on avaliacoes    for all using (auth.uid() is not null) with check (auth.uid() is not null);
create policy "auth_all" on requisitos    for all using (auth.uid() is not null) with check (auth.uid() is not null);

drop policy if exists "profiles_read" on profiles;
drop policy if exists "profiles_update_own" on profiles;
drop policy if exists "profiles_insert" on profiles;
create policy "profiles_read" on profiles for select using (auth.uid() is not null);
create policy "profiles_update_own" on profiles for update using (auth.uid() = id);
create policy "profiles_insert" on profiles for insert with check (auth.uid() = id);

-- 4. Trigger: cria profile automaticamente em cada signup
create or replace function handle_new_user()
returns trigger language plpgsql security definer set search_path = public as $$
begin
  insert into public.profiles (id, nome, email, papel)
  values (
    new.id,
    coalesce(new.raw_user_meta_data->>'nome', split_part(new.email, '@', 1)),
    new.email,
    'usuario'
  );
  return new;
end;
$$;

drop trigger if exists on_auth_user_created on auth.users;
create trigger on_auth_user_created
  after insert on auth.users
  for each row execute function handle_new_user();`;

function AdminSupabase({state, dispatch}) {
  const [f, setF] = useState({url:state.config.supabaseUrl, key:state.config.supabaseKey});
  const [status, setStatus] = useState('');
  const [busy, setBusy] = useState(false);

  const save = () => { dispatch({type:'UPD_CFG', payload:{supabaseUrl:f.url, supabaseKey:f.key}}); setStatus('Configuração guardada.'); };
  const test = async () => {
    if (!f.url || !f.key) return setStatus('Preenche URL e chave.');
    setBusy(true); setStatus('A testar ligação…');
    try {
      const sb = window.supabase.createClient(f.url, f.key);
      const { error } = await sb.from('colaboradores').select('id').limit(1);
      if (error) throw error;
      setStatus('✓ Ligação Supabase OK.');
      dispatch({type:'UPD_CFG', payload:{supabaseUrl:f.url, supabaseKey:f.key, cloudHabilitado:true}});
    } catch(e) { setStatus('✗ Erro: '+e.message); }
    setBusy(false);
  };
  const sync = async () => {
    setBusy(true); setStatus('A enviar para a cloud…');
    const res = await syncDataToCloud(state);
    setStatus(res.ok ? '✓ Sincronização concluída.' : ('✗ Erro: '+(res.error?.message||'')));
    setBusy(false);
  };
  const reload = async () => {
    if (!confirm('Recarregar dados da cloud? Isto substitui o que tens no browser.')) return;
    setBusy(true); setStatus('A descarregar da cloud…');
    const res = await loadDataFromCloud(dispatch, null);
    setStatus(res.error ? ('✗ Erro: '+res.error.message) : '✓ Dados recarregados.');
    setBusy(false);
  };
  const copySQL = () => { navigator.clipboard.writeText(SQL_SUPABASE); setStatus('SQL copiado para o clipboard.'); };

  return html`
    <${Card} class="p-5 space-y-5">
      <div>
        <h3 class="font-semibold text-ink-900 flex items-center gap-2"><${Icon.Cloud} size=${18}/> Integração Supabase</h3>
        <p class="text-sm text-ink-600 mt-1">Liga a app a uma base de dados Supabase para multi-utilizador e acesso partilhado. Os dados continuam a funcionar localmente mesmo sem cloud.</p>
      </div>
      <div class="space-y-3 max-w-2xl">
        <${Field} label="Supabase URL" hint="Ex: https://xxx.supabase.co">
          <${Input} value=${f.url} onInput=${e=>setF({...f,url:e.target.value})} placeholder="https://xxx.supabase.co"/></${Field}>
        <${Field} label="Anon Key" hint="Chave pública (anon public key)">
          <${Input} type="password" value=${f.key} onInput=${e=>setF({...f,key:e.target.value})}/></${Field}>
        <div class="flex gap-2 flex-wrap">
          <${Button} onClick=${save}>Guardar</${Button}>
          <${Button} variant="outline" onClick=${test} disabled=${busy}>Testar ligação</${Button}>
          <${Button} variant="success" onClick=${sync} disabled=${busy}>Enviar para a cloud</${Button}>
          <${Button} variant="outline" onClick=${reload} disabled=${busy}>Recarregar da cloud</${Button}>
        </div>
        <div class="text-xs text-ink-500">A sincronização para a cloud é automática 1.5s após cada alteração. Estes botões são para forçar manualmente.</div>
        ${status && html`<div class=${'p-3 rounded-lg text-sm '+(status.startsWith('✓')?'bg-emerald-50 text-emerald-700':status.startsWith('✗')?'bg-rose-50 text-rose-700':'bg-ink-50 text-ink-700')}>${status}</div>`}
      </div>
      <div class="border-t border-ink-100 pt-4">
        <div class="flex items-center justify-between mb-2">
          <h4 class="font-semibold text-ink-900">SQL para criar as tabelas</h4>
          <${Button} size="sm" variant="outline" onClick=${copySQL}><${Icon.Copy} size=${14}/> Copiar</${Button}>
        </div>
        <p class="text-xs text-ink-500 mb-2">Cria um projeto em supabase.com, abre o SQL Editor e cola este script:</p>

function Login({dispatch, config, loginError}) {
  const [mode, setMode] = useState('login');
  const [nome, setNome] = useState('');
  const [email, setEmail] = useState('');
  const [senha, setSenha] = useState('');
  const [show, setShow] = useState(false);
  const [busy, setBusy] = useState(false);
  const [info, setInfo] = useState('');

  const submit = async (e) => {
    e?.preventDefault();
    if(!email||!senha) return;
    setBusy(true); setInfo(''); dispatch({type:'CLR_ERR'});
    try {
      if (mode === 'login') {
        const { error } = await sb.auth.signInWithPassword({ email: email.trim(), password: senha });
        if (error) throw error;
      } else {
        if (!nome.trim()) { dispatch({type:'SET_LOGIN_ERROR', payload:'Indica o teu nome.'}); setBusy(false); return; }
        if (senha.length < 6) { dispatch({type:'SET_LOGIN_ERROR', payload:'Palavra-passe precisa de pelo menos 6 caracteres.'}); setBusy(false); return; }
        const { data, error } = await sb.auth.signUp({
          email: email.trim(),
          password: senha,
          options: { data: { nome: nome.trim() } }
        });
        if (error) throw error;
        if (data?.user && !data?.session) {
          setInfo('Conta criada. Verifica o teu email para confirmar antes de fazer login.');
          setMode('login');
        }
      }
    } catch(err) {
      dispatch({type:'SET_LOGIN_ERROR', payload: err.message || 'Erro ao autenticar.'});
    }
    setBusy(false);
  };

  const resetData = () => { if (confirm('Limpar dados locais e recarregar?')) { localStorage.removeItem(STORE_KEY); location.reload(); } };

  return html`
    <div class="min-h-screen flex items-center justify-center p-4 bg-ink-50">
      <div class="relative w-full max-w-md fade-in">
        <div class="bg-white rounded-2xl border border-ink-200 overflow-hidden">
          <div class="p-8 pb-6 text-center">
            <div class="inline-flex w-14 h-14 rounded-xl bg-brand-600 items-center justify-center mb-4">
              ${config.logo ? html`<img src=${config.logo} class="w-full h-full rounded-xl object-cover"/>` : html`<${Icon.Grid} size=${24} class="text-white"/>`}
            </div>
            <h1 class="text-xl font-semibold text-ink-900">${config.empresa}</h1>
            <p class="text-sm text-ink-500 mt-1">Matriz de Competências · ${mode==='login'?'Entrar':'Criar conta'}</p>
          </div>
          <form onSubmit=${submit} class="px-8 pb-6 space-y-4">
            ${mode==='signup' && html`
              <${Field} label="Nome completo"><${Input} value=${nome} onInput=${e=>{setNome(e.target.value);dispatch({type:'CLR_ERR'});}} placeholder="O teu nome" autoFocus/></${Field}>`}
            <${Field} label="Email"><${Input} type="email" value=${email} onInput=${e=>{setEmail(e.target.value);dispatch({type:'CLR_ERR'});}} placeholder="utilizador@empresa.pt" autoFocus=${mode==='login'}/></${Field}>
            <${Field} label="Palavra-passe" hint=${mode==='signup'?'Mínimo 6 caracteres':''}>
              <div class="relative">
                <${Input} type=${show?'text':'password'} value=${senha} onInput=${e=>{setSenha(e.target.value);dispatch({type:'CLR_ERR'});}} class="pr-10"/>
                <button type="button" onClick=${()=>setShow(!show)} class="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 rounded text-ink-400 hover:text-ink-700">
                  ${show ? '🙈' : '👁'}
                </button>
              </div>
            </${Field}>
            ${loginError && html`<div class="p-3 rounded-lg bg-rose-50 text-rose-700 text-sm border border-rose-100">${loginError}</div>`}
            ${info && html`<div class="p-3 rounded-lg bg-emerald-50 text-emerald-700 text-sm border border-emerald-100">${info}</div>`}
            <button type="submit" disabled=${busy} class="w-full py-2.5 rounded-lg bg-brand-600 hover:bg-brand-700 text-white font-medium transition disabled:opacity-60">
              ${busy ? (mode==='login'?'A entrar…':'A criar conta…') : (mode==='login'?'Entrar':'Criar conta')}
            </button>
          </form>
          <div class="px-8 py-4 bg-ink-50 border-t border-ink-100 text-center text-sm">
            ${mode==='login' ? html`
              <span class="text-ink-500">Não tens conta?</span>
              <button type="button" onClick=${()=>{setMode('signup');setInfo('');dispatch({type:'CLR_ERR'});}} class="ml-1 text-brand-600 font-medium hover:text-brand-700">Criar conta</button>` : html`
              <span class="text-ink-500">Já tens conta?</span>
              <button type="button" onClick=${()=>{setMode('login');setInfo('');dispatch({type:'CLR_ERR'});}} class="ml-1 text-brand-600 font-medium hover:text-brand-700">Entrar</button>`}
          </div>
        </div>
        <div class="text-center text-xs text-ink-400 mt-4">Matriz de Competências · v2.1 · <button type="button" onClick=${resetData} class="underline hover:text-ink-700">Limpar dados locais</button></div>
      </div>
    </div>`;
}

function ChangePassword({user, dispatch, onClose}) {
  const [nv1, setNv1] = useState('');
  const [nv2, setNv2] = useState('');
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);
  const save = async () => {
    setErr('');
    if (nv1.length < 6) return setErr('Nova palavra-passe precisa de pelo menos 6 caracteres.');
    if (nv1 !== nv2) return setErr('A confirmação não coincide.');
    setBusy(true);
    try {
      const { error } = await sb.auth.updateUser({ password: nv1 });
      if (error) throw error;
      onClose(); alert('Palavra-passe alterada.');
    } catch(e) {
      setErr(e.message || 'Erro ao alterar palavra-passe.');
    }
    setBusy(false);
  };
  return html`

      <div class="flex justify-end gap-2"><${Button} variant="outline" onClick=${onClose}>Cancelar</${Button}><${Button} onClick=${save} disabled=${busy}>${busy?'A alterar…':'Alterar'}</${Button}></div>
    </div>`;
}
